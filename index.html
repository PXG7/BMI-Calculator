<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Miniver&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="container">
        <div class="box">
        <h1>BMI Calculator</h1>
        <div class="content">
            <div class="input">
                <label for="height">Height(cm)</label>
                <input type="number" id="height">
            </div>
            <div class="input">
                <label for="weight">Weight(kg)</label>
                <input type="number" id="weight">
            </div>
            <button id="calculator">Calculator BMI</button>
        </div>
        <div class="result">
            <p>Your BMI is </p>
            <div id="result">00.00</div>
            <p class="comment">Comment</p>
        </div>
    </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
